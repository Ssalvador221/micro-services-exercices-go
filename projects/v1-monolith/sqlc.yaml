version: "2"

sql:
  - engine: "mysql"
    schema: "./internal/infraestructure/db/sqlc/migrations"
    queries: "./internal/infraestructure/db/sqlc/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/infraestructure/db/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exported_queries: true